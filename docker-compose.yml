services:
  backend:
    build:
      context: ./backend
    container_name: takeout-viewer-backend
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TAKEOUT_DATA_DIR=/app/data
      - TAKEOUT_IMPORTS_DIR=/app/data/imports
      - TAKEOUT_DB_PATH=/app/data/db/takeout_viewer.sqlite
      - TAKEOUT_LOGS_DIR=/app/data/logs
      - TAKEOUT_OLLAMA_URL=http://host.docker.internal:11434
      - TAKEOUT_LLM_MODEL=SpeakLeash/bielik-11b-v2.3-instruct:Q4_K_M
      - TAKEOUT_EMBED_MODEL=bge-m3:latest
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: takeout-viewer-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
    restart: unless-stopped
